<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Аудит ресторана</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
.app { max-width: 560px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.screen { display: none; }
.screen.active { display: block; }

.logo { text-align: center; margin-bottom: 1.5rem; padding-top: 0.5rem; }
.logo h1 { font-size: 20px; font-weight: 600; margin-bottom: 3px; }
.logo p { font-size: 13px; color: #888; }

.card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e6; padding: 1.25rem; margin-bottom: 1rem; }

label { font-size: 13px; color: #666; margin-bottom: 5px; display: block; font-weight: 500; }
select, input { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 10px; background: #fff; color: #1a1a1a; font-size: 16px; font-family: inherit; margin-bottom: 12px; appearance: none; -webkit-appearance: none; }
select:focus, input:focus { outline: none; border-color: #1a1a1a; }
input:last-child, select:last-child { margin-bottom: 0; }

.btn { display: block; width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; border: none; text-align: center; }
.btn-primary { background: #1a1a1a; color: #fff; }
.btn-primary:active { background: #444; }
.btn-secondary { background: #f0f0ee; color: #1a1a1a; margin-top: 10px; }
.btn-secondary:active { background: #e0e0de; }
.btn:disabled { opacity: 0.5; }

.progress-wrap { margin-bottom: 1rem; }
.progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.section-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #999; max-width: 70%; }
.q-counter { font-size: 13px; color: #999; white-space: nowrap; }
.progress-bar { height: 3px; background: #e0e0de; border-radius: 2px; }
.progress-fill { height: 3px; background: #1a1a1a; border-radius: 2px; transition: width 0.3s ease; }

.q-importance { font-size: 11px; color: #bbb; margin-bottom: 6px; }
.q-text { font-size: 15px; line-height: 1.55; color: #1a1a1a; margin-bottom: 1.1rem; }

.score-btns { display: flex; gap: 8px; margin-bottom: 12px; }
.score-btn { flex: 1; padding: 13px 6px; border: 1.5px solid #e0e0de; border-radius: 12px; background: #fff; color: #1a1a1a; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.12s; user-select: none; }
.score-btn:active { transform: scale(0.96); }
.score-btn.yes { background: #edf7ed; border-color: #5a9e5a; color: #2d6e2d; }
.score-btn.no  { background: #fdf0f0; border-color: #e06060; color: #a33030; }
.score-btn.na  { background: #f5f5f3; border-color: #bbb; color: #666; }

textarea { width: 100%; padding: 10px 14px; border: 1px solid #e0e0de; border-radius: 10px; background: #fafafa; color: #1a1a1a; font-size: 15px; font-family: inherit; resize: none; line-height: 1.5; }
textarea:focus { outline: none; border-color: #1a1a1a; background: #fff; }

.nav-row { display: flex; gap: 10px; margin-top: 1rem; }
.btn-back { background: #f0f0ee; color: #1a1a1a; flex: 0 0 auto; width: auto; padding: 14px 18px; font-weight: 500; }
.btn-back:active { background: #e0e0de; }
.btn-fwd { flex: 1; }

.result-card { text-align: center; padding: 1.5rem 0.5rem 1rem; }
.score-pct { font-size: 64px; font-weight: 700; letter-spacing: -3px; line-height: 1; margin: 0.75rem 0 0.4rem; }
.score-sub { font-size: 14px; color: #888; margin-bottom: 1.75rem; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.75rem; }
.stat-box { background: #f5f5f3; border-radius: 12px; padding: 14px 6px; }
.stat-num { font-size: 28px; font-weight: 700; }
.stat-lbl { font-size: 11px; color: #999; margin-top: 2px; }
.yes-c { color: #2d6e2d; }
.no-c  { color: #a33030; }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">

  <div class="screen active" id="screen-start">
    <div class="logo">
      <h1>Аудит ресторана</h1>
      <p>Тайный гость · 45 вопросов</p>
    </div>
    <div class="card">
      <label>Ресторан</label>
      <select id="rest-select">
        <option value="">Выберите ресторан...</option>
        <option>Ели Ботаника</option>
        <option>Ромо</option>
        <option>Ели ЗИЛ</option>
        <option>Ели Фили</option>
        <option>Ели Гжатская</option>
        <option>ОДА</option>
      </select>
      <label>Имя проверяющего</label>
      <input id="auditor-name" type="text" placeholder="Ваше имя" autocomplete="name">
      <label>Имя менеджера на смене</label>
      <input id="manager-name" type="text" placeholder="Имя менеджера">
    </div>
    <button class="btn btn-primary" onclick="startAudit()">Начать аудит</button>
  </div>

  <div class="screen" id="screen-audit">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="section-name" id="section-name"></span>
        <span class="q-counter" id="q-counter">1 / 45</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:2%"></div></div>
    </div>
    <div class="card">
      <div class="q-importance" id="q-importance"></div>
      <div class="q-text" id="q-text"></div>
      <div class="score-btns">
        <button class="score-btn" id="btn-yes" onclick="setScore(1)">✓ Да</button>
        <button class="score-btn" id="btn-no" onclick="setScore(0)">✗ Нет</button>
        <button class="score-btn" id="btn-na" onclick="setScore('N')">— N/A</button>
      </div>
      <textarea id="q-comment" rows="2" placeholder="Комментарий..."></textarea>
    </div>
    <div class="nav-row">
      <button class="btn btn-back" id="btn-prev" onclick="prevQ()">← Назад</button>
      <button class="btn btn-primary btn-fwd" id="btn-next" onclick="nextQ()">Далее →</button>
    </div>
  </div>

  <div class="screen" id="screen-result">
    <div class="card result-card">
      <p style="font-size:13px;color:#999;">Аудит завершён</p>
      <div class="score-pct" id="res-score">0%</div>
      <div class="score-sub" id="res-sub"></div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num yes-c" id="res-yes">0</div><div class="stat-lbl">Выполнено</div></div>
        <div class="stat-box"><div class="stat-num no-c"  id="res-no">0</div><div class="stat-lbl">Не выполнено</div></div>
        <div class="stat-box"><div class="stat-num"       id="res-na">0</div><div class="stat-lbl">N/A</div></div>
      </div>
      <button class="btn btn-primary" id="dl-btn" onclick="downloadExcel()">⬇ Скачать Excel</button>
      <button class="btn btn-secondary" onclick="newAudit()">Новый аудит</button>
    </div>
  </div>

</div>
<script>
const QUESTIONS = [
  {section:"ВХОДНАЯ ГРУППА",text:"Входная группа чистая",importance:2},
  {section:null,text:"Вывеска горит",importance:1},
  {section:null,text:"Сотрудники приветливо и радушно встречают гостей, предлагают стол и помочь с размещением - подставка под сумку/меню, нет потерянных гостей, которые не понимают, куда им идти",importance:2},
  {section:null,text:"Вся зона входа и в полном порядке - гардероб/ вешалки/циновки на столах и тд, нет ничего лишнего - первое впечатление после входа в ресторан - полный порядок в деталях",importance:2},
  {section:null,text:"Сотрудники работают в команде, чувствуется дружелюбная атмосфера, на столах у гостей нет грязной посуды",importance:1},
  {section:null,text:"Администратор в зале есть, помогает с сервисом, включен в рабочий процесс",importance:2},
  {section:"ПОДРАЗДЕЛЕНИЯ РЕСТОРАНА И ПЕРВОЕ ВПЕЧАТЛЕНИЕ",text:"Меню и все печатные материалы в хорошем состоянии, чистые, без заломов, актуальные, все страницы в наличии",importance:3},
  {section:null,text:"Вентиляция работает бесшумно, посторонних запахов и запахов еды нет, задымленность отсутствует",importance:2},
  {section:null,text:"Громкость музыки комфортная - не громко, но и не тихо, играет подходящий репертуар, освещение соответствует времени суток, над столами включен свет, отсутствуют перегоревшие лампы",importance:2},
  {section:null,text:"Флористика во всем ресторане в хорошем состоянии - большие вазы, вазы в уборных, вазы на столах, цветы на входных зонах",importance:1},
  {section:null,text:"Форма всех сотрудников зала чистая, выглаженная, обувь без повреждений, внешний вид в полном порядке, волосы собраны, сотрудник выглядит соответствующе",importance:2},
  {section:null,text:"Чистота везде: стены, мебель, вытяжки, решетки на стенах, поверхности столов, станции официанта, холодильники, все полки и рабочие поверхности; на рабочих поверхностях также отсутствуют личные вещи",importance:2},
  {section:null,text:"Санузел чистый, зеркала без подтеков, столешницы и сантехника чистые",importance:2},
  {section:null,text:"Детали интерьера, мебель - все в полном порядке и в хорошем состоянии, столы не шатаются, жвачек на обратной стороне столов нет, диваны и кресла чистые без волос и пыли",importance:3},
  {section:null,text:"Сотрудники доставки выглядят опрятно, находятся на рабочем месте",importance:1},
  {section:null,text:"Сервировка расставлена на столах/баре, вся посуда чистая, без сколов, лишняя сервировка снимается",importance:1},
  {section:"ОСОБЕННОСТИ РЕСТОРАНА",text:"Сотрудники не сидят на стульях для гостей, все распределены четко по позициям",importance:2},
  {section:null,text:"Шторы во всем ресторане чистые и открыты/закрыты в зависимости от времени суток",importance:3},
  {section:null,text:"Сотрудники улыбаются гостям, внимательно контролируют посадку",importance:1},
  {section:"СОБЛЮДЕНИЕ СТАНДАРТОВ СЕРВИСА",text:"Сотрудники подают меню открытой рукой, в открытом виде и прямо в руки, дополнительное меню размещают на столе и комментируют свои действия",importance:2},
  {section:null,text:"Сотрудники предлагают заказать напитки на этапе подачи меню",importance:2},
  {section:null,text:"Сотрудники хорошо знают меню",importance:3},
  {section:null,text:"Сотрудники хорошо работают по доп продажам",importance:2},
  {section:null,text:"Сотрудники уточняют последовательность подачи блюд и повторяют заказ",importance:2},
  {section:null,text:"Все блюда и напитки, которые выносятся гостю соответствуют стандарту",importance:2},
  {section:null,text:"Сотрудники запрашивают обратную связь",importance:2},
  {section:null,text:"Сотрудники своевременно зачищают столы",importance:1},
  {section:null,text:"Доставка собирается корректно, в термо-пакетах, брендированных пакетах и коробках",importance:1},
  {section:null,text:"Сотрудники быстро приносят счёт и своевременно рассчитывают гостей",importance:1},
  {section:"КУХНЯ",text:"Блюда на раздаче не стоят дольше 1 минуты",importance:1},
  {section:null,text:"Чистота всех поверхностей и пола в зоне кухни, порядок на стеллажах и раздаче, нет лишних предметов и личных вещей",importance:2},
  {section:null,text:"Все блюда по вкусу и виду подачи соответствуют стандарту",importance:1},
  {section:null,text:"Не нарушены условия хранения продукции, везде присутствует маркировка",importance:1},
  {section:null,text:"Все сотрудники кухни выглядят опрятно, волосы убраны",importance:2},
  {section:"БАР",text:"Чистота всех поверхностей, стен и пола в зоне бара ресторана",importance:2},
  {section:null,text:"Все позиции бара в наличии/ вина/ крепкий алкоголь/ лимонады/ пунши и тд",importance:3},
  {section:null,text:"Все стекло, барная посуда и инвентарь чистые и натертые, без сколов",importance:2},
  {section:null,text:"Все сотрудники выглядят опрятно, волосы убраны",importance:2},
  {section:null,text:"Напитки на раздачах не стоят дольше 1 минуты",importance:2},
  {section:"СОТРУДНИКИ",text:"Сотрудники клининговой службы выглядит опрятно, одеты в униформу, обувь закрытая; Передвигаются по залу незаметно и не мешают нахождению гостей в ресторане",importance:2},
  {section:null,text:"Все сотрудники общаются в естественной, дружелюбной и заинтересованной манере друг с другом и с гостями, проявляют инициативу при общении с гостем, запрашивают обратную связь, поддерживают с ним зрительный контакт, не чувствуется негатива в коллективе",importance:2},
  {section:null,text:"Отсутствует запах изо рта, запах пота, сигарет, резкий парфюм, волосы у сотрудников убранные и чистые, аккуратный маникюр",importance:2},
  {section:null,text:"Сотрудники не пользуются мобильными телефонами в зале, не расчесывают волосы, не трогают лицо/уши, не жуют жвачку",importance:2},
  {section:null,text:"В речи всех сотрудников отсутствуют слова-паразиты, мат, жаргонизмы, профессиональный сленг",importance:2},
  {section:"Общее впечатление",text:"Общее впечатление от посещения ресторана положительное",importance:1},
];

let answers=[], current=0, restaurant='', auditorName='', managerName='', auditDate='';

function startAudit() {
  restaurant = document.getElementById('rest-select').value;
  auditorName = document.getElementById('auditor-name').value.trim();
  managerName = document.getElementById('manager-name').value.trim();
  if (!restaurant) { alert('Выберите ресторан'); return; }
  const now = new Date();
  auditDate = String(now.getDate()).padStart(2,'0')+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+now.getFullYear();
  current = 0;
  answers = QUESTIONS.map(() => ({score:null, comment:''}));
  showScreen('screen-audit'); renderQ();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function getCurrentSection() {
  let s=null;
  for (let i=0;i<=current;i++) if(QUESTIONS[i].section) s=QUESTIONS[i].section;
  return s||'';
}

function renderQ() {
  const q=QUESTIONS[current], a=answers[current];
  document.getElementById('section-name').textContent = getCurrentSection();
  document.getElementById('q-counter').textContent = (current+1)+' / '+QUESTIONS.length;
  document.getElementById('progress-fill').style.width = ((current+1)/QUESTIONS.length*100)+'%';
  document.getElementById('q-importance').textContent = 'Важность: '+q.importance;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-comment').value = a.comment;
  document.getElementById('btn-yes').className = 'score-btn'+(a.score===1?' yes':'');
  document.getElementById('btn-no').className  = 'score-btn'+(a.score===0?' no':'');
  document.getElementById('btn-na').className  = 'score-btn'+(a.score==='N'?' na':'');
  document.getElementById('btn-prev').disabled = current===0;
  document.getElementById('btn-next').textContent = current===QUESTIONS.length-1 ? 'Завершить ✓' : 'Далее →';
}

function setScore(val) { answers[current].score=val; renderQ(); }
document.addEventListener('input', e => { if(e.target.id==='q-comment') answers[current].comment=e.target.value; });
function nextQ() {
  if(answers[current].score===null){alert('Поставьте оценку');return;}
  if(current<QUESTIONS.length-1){current++;renderQ();}else showResult();
}
function prevQ() { if(current>0){current--;renderQ();} }

function showResult() {
  const yes=answers.filter(a=>a.score===1).length;
  const no=answers.filter(a=>a.score===0).length;
  const na=answers.filter(a=>a.score==='N').length;
  const pct=(yes+no)>0?Math.round(yes/(yes+no)*100):0;
  document.getElementById('res-score').textContent=pct+'%';
  document.getElementById('res-sub').textContent=restaurant+' · '+auditDate;
  document.getElementById('res-yes').textContent=yes;
  document.getElementById('res-no').textContent=no;
  document.getElementById('res-na').textContent=na;
  showScreen('screen-result');
}

async function downloadExcel() {
  const btn=document.getElementById('dl-btn');
  btn.innerHTML='<span class="spinner"></span>Генерирую...';
  btn.disabled=true;
  try {
    const resp = await fetch('/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({restaurant, date:auditDate, auditor:auditorName, manager:managerName, answers})
    });
    if(!resp.ok) throw new Error('Ошибка сервера');
    const blob=await resp.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=restaurant+'_'+auditDate+'.xlsx'; a.click();
    URL.revokeObjectURL(url);
    btn.innerHTML='✓ Файл скачан!';
    setTimeout(()=>{btn.innerHTML='⬇ Скачать Excel';btn.disabled=false;},3000);
  } catch(e) {
    alert('Ошибка: '+e.message);
    btn.innerHTML='⬇ Скачать Excel'; btn.disabled=false;
  }
}

function newAudit() {
  document.getElementById('rest-select').value='';
  document.getElementById('auditor-name').value='';
  document.getElementById('manager-name').value='';
  showScreen('screen-start');
}
</script>
</body>
</html>
